{% extends "master.html" %}

{% block title %}{% if edit %}Editar{% else %}Novo{% endif %} Serviço{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{% if edit %}<i class="fas fa-edit"></i> Editar Serviço{% else %}<i class="fas fa-plus"></i> Novo Serviço{% endif %}</h1>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-form"></i> Formulário de Serviço
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="tipo_protese" class="form-label">Tipo de Prótese *</label>
                        <input type="text" class="form-control" id="tipo_protese" name="tipo_protese"
                               value="{% if servico %}{{ servico.tipo_protese }}{% endif %}" required>
                    </div>

                    <div class="mb-3">
                        <label for="material" class="form-label">Material</label>
                        <input type="text" class="form-control" id="material" name="material"
                               value="{% if servico %}{{ servico.material }}{% endif %}">
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="3">{% if servico %}{{ servico.descricao }}{% endif %}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="dentista" class="form-label">Dentista</label>
                        <select class="form-select" id="dentista" name="dentista">
                            <option value="">Selecione um dentista</option>
                            {% for d in dentistas %}
                                <option value="{{ d.id }}" {% if servico.dentista_id == d.id %}selected{% endif %}>
                                    {{ d.nome }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="paciente" class="form-label">Paciente</label>
                        <input type="text" class="form-control" id="paciente" name="paciente"
                               value="{% if servico %}{{ servico.paciente }}{% endif %}"
                               placeholder="Nome do paciente">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="data_entrada" class="form-label">Data de Entrada *</label>
                            <input type="date" class="form-control" id="data_entrada" name="data_entrada"
                                   value="{% if servico %}{{ servico.data_entrada|date:'Y-m-d' }}{% endif %}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="data_prevista_saida" class="form-label">Data Prevista de Saída</label>
                            <input type="date" class="form-control" id="data_prevista_saida" name="data_prevista_saida"
                                   value="{% if servico %}{{ servico.data_prevista_saida|date:'Y-m-d' }}{% endif %}">
                        </div>
                    </div>

                   <div class="col-md-6 mb-3">
                        <label for="valor_servico" class="form-label">Valor do Serviço</label>
                        <div class="input-group">
                            <span class="input-group-text">R$</span>
                            <input type="text" 
                                class="form-control" 
                                id="valor_servico" 
                                name="valor_servico"
                                value="{% if servico %}{{ servico.valor_servico }}{% endif %}"
                                placeholder="0,00">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status">
                            {% for code, label in statuses %}
                                <option value="{{ code }}" {% if servico.status == code %}selected{% endif %}>
                                    {{ label }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                        <a href="{% url 'servico:servico' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
